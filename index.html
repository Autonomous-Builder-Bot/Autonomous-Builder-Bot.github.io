<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colin Loves Lyndsey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-glow glow-1"></div>
  <div class="background-glow glow-2"></div>
  <div id="hearts-container" aria-hidden="true"></div>

  <main class="wrap">
    <section class="card">
      <p class="eyebrow">A little corner of the internet for Lyndsey</p>
      <h1>Colin <span>loves</span> Lyndsey</h1>
      <p class="subhead">Whenever you want a reminder, this page is here waiting for you.</p>

      <div class="message-box">
        <p id="message">You are loved. Deeply, truly, and always.</p>
      </div>

      <div class="actions">
        <button id="new-message" class="btn primary">Another reminder</button>
        <button id="send-hearts" class="btn secondary">Send hearts</button>
      </div>

      <p class="footer-note">Made by Colin, for Lyndsey 💗</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
